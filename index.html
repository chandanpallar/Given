<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{background:#fafafa;color:#333}

/* NAVBAR */
nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:15px 40px;background:#111;color:#fff;
  position:sticky;top:0;z-index:1000;
}
nav a{color:#fff;text-decoration:none;margin-left:20px}
nav a:hover{color:#ff4d4d}

/* HERO */
.hero{
  height:90vh;
  background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover;
  display:flex;align-items:center;justify-content:center;
  position:relative;color:#fff;text-align:center;
}
.hero::after{
  content:"";position:absolute;top:0;left:0;
  width:100%;height:100%;background:rgba(0,0,0,0.6);
}
.hero-content{position:relative;z-index:1}
.hero h1{font-size:50px}
.hero button{
  margin-top:20px;padding:12px 25px;
  border:none;background:#ff4d4d;color:#fff;
  cursor:pointer;border-radius:5px;
  transition:0.3s;
}
.hero button:hover{background:#e60000}

/* SECTION */
.section{padding:60px 20px;text-align:center}

/* CARDS */
.cards{
  display:flex;flex-wrap:wrap;
  justify-content:center;gap:20px;margin-top:20px
}
.card{
  background:#fff;padding:20px;width:250px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-10px);
}

/* CONTACT */
input,textarea{
  width:80%;padding:12px;margin:10px 0;
  border:1px solid #ccc;border-radius:5px
}
button.submit{
  padding:12px 25px;background:#111;color:#fff;
  border:none;border-radius:5px;cursor:pointer
}

/* FOOTER */
footer{
  background:#111;color:#fff;
  text-align:center;padding:20px;margin-top:30px
}

/* WHATSAPP BUTTON */
.whatsapp{
  position:fixed;bottom:20px;right:20px;
  background:#25D366;color:#fff;
  padding:15px;border-radius:50%;
  text-decoration:none;font-size:20px;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero h1{font-size:30px}
  nav{flex-direction:column}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>FoodHub</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Delicious Food Delivered</h1>
    <p>Fresh • Fast • Affordable</p>
    <button onclick="scrollToContact()">Order Now</button>
  </div>
</section>

<!-- FEATURES -->
<section class="section">
  <h2>Why Choose Us</h2>
  <div class="cards">
    <div class="card">Fresh Ingredients</div>
    <div class="card">Fast Delivery</div>
    <div class="card">Best Taste</div>
  </div>
</section>

<!-- MENU -->
<section class="section">
  <h2>Our Menu</h2>
  <div class="cards">
    <div class="card">Pizza - ₹199</div>
    <div class="card">Burger - ₹99</div>
    <div class="card">Pasta - ₹149</div>
  </div>
</section>

<!-- CONTACT -->
<section class="section" id="contact">
  <h2>Contact Us</h2>
  <input type="text" placeholder="Your Name"><br>
  <input type="email" placeholder="Your Email"><br>
  <textarea placeholder="Message"></textarea><br>
  <button class="submit">Send</button>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 FoodHub</p>
</footer>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/919999999999">💬</a>

<script>
function scrollToContact(){
  document.getElementById("contact").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
